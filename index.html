<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackGrow</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    background:#f4f6f9;
    padding:40px;
  }

  h1{
    text-align:center;
    margin-bottom:40px;
    color:#222;
  }

  .layout{
    display:flex;
    justify-content:center;
    gap:30px;
    align-items:flex-start;
  }

  .container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    max-width:900px;
  }

  .card{
    width:280px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
  }

  .card img{
    width:100%;
    height:170px;
    object-fit:cover;
  }

  .card-content{
    padding:20px;
  }

  .card h4{
    margin-bottom:10px;
    color:#333;
  }

  .card p{
    color:#666;
    margin-bottom:8px;
  }

  button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
  }

  button:hover{
    background:#3f9443;
  }

  .locked{
    opacity:0.7;
  }

  .locked button{
    background:#999;
    cursor:not-allowed;
  }

  .lock{
    color:#d9534f;
    font-weight:bold;
    margin-bottom:10px;
  }

  .sidebar{
    width:220px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    height:fit-content;
  }

  .sidebar h3{
    margin-bottom:15px;
    color:#333;
  }

  .sidebar p{
    margin-bottom:10px;
    color:#555;
  }

  .sidebar button{
    background:#007bff;
    margin-top:10px;
  }

  .sidebar button:hover{
    background:#0062cc;
  }
</style>

</head>
<body>

<h1>HackGrow Dashboard</h1>

<div class="layout">

  <div class="container">

      <div class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIjd7YhkePgIbmctSWkRKtYfpXjLphzJ9-hqwsJpyieA&s">
          <div class="card-content">
              <h4>Day 1</h4>
              <p>Little project description</p>
              <p>2 Hours</p>
              <button>Join →</button>
          </div>
      </div>

      <div class="card locked" id="day2">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmI1-zzDHSOWMM1tZ49EZgsRs0tpBhXCbGG6FWW-OkHQ&s">
          <div class="card-content">
              <div class="lock">Locked</div>
              <h4>Day 2</h4>
              <p>Coming soon</p>
              <p>-- Hours</p>
              <button disabled>Locked</button>
          </div>
      </div>

  </div>

  <div class="sidebar">
    <h3>Progress</h3>
    <p>Day 1: ❌</p>
    <p>Day 2: 🔒</p>

    <h3>Actions</h3>
    <button>Reset</button>
  </div>

</div>

</body>
</html>
